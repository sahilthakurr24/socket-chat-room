<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket Chat</title>
    <style>
        :root {
            --bg: #f4f4f4;
            --panel: #ffffff;
            --border: #d9d9d9;
            --text: #222222;
            --muted: #777777;
            --accent: #0b57d0;
            --self: #dcf8c6;
            --other: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body {
            display: flex;
            justify-content: center;
            padding: 24px 16px;
        }

        .chat-app {
            width: 100%;
            max-width: 860px;
            height: calc(100vh - 48px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .chat-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-title h1 {
            margin: 0;
            font-size: 18px;
        }

        .chat-title p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        .status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #9ca3af;
            flex-shrink: 0;
        }

        .status.connected {
            background: #22c55e;
        }

        .messages {
            padding: 20px;
            overflow-y: auto;
            background: #efeae2;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 10px 12px;
            border-radius: 10px;
            line-height: 1.4;
            font-size: 15px;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.06);
        }

        .message.other {
            align-self: flex-start;
            background: var(--other);
            border: 1px solid #e7e7e7;
        }

        .message.self {
            align-self: flex-end;
            background: var(--self);
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--muted);
            font-size: 13px;
            box-shadow: none;
            padding: 0;
        }

        .meta {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            text-align: right;
        }

        .typing {
            min-height: 18px;
            padding: 0 2px 10px;
            color: var(--muted);
            font-size: 13px;
        }

        .chat-input {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            background: var(--panel);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        .input-row input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .input-row input:focus {
            border-color: var(--accent);
        }

        .input-row button {
            padding: 12px 18px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            body {
                padding: 0;
            }

            .chat-app {
                height: 100vh;
                border-radius: 0;
                border-left: 0;
                border-right: 0;
            }

            .message {
                max-width: 88%;
            }
        }
    </style>
</head>
<body>
    <main class="chat-app">
        <header class="chat-header">
            <div class="chat-title">
                <h1>Chat Room</h1>
                <p id="usernameLabel">Connecting...</p>
            </div>
            <div class="header-right">
                <span class="status" id="connectionStatus" aria-label="connection status"></span>
                <span id="connectionLabel">Disconnected</span>
            </div>
        </header>

        <section class="messages" id="messages"></section>

        <footer class="chat-input">
            <div class="typing" id="typingIndicator"></div>
            <form class="input-row" id="chatForm">
                <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" />
                <button id="sendButton" type="submit">Send</button>
            </form>
        </footer>
    </main>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
    <script>
        const socket = io("http://localhost:8000");
        const messagesEl = document.getElementById("messages");
        const messageInputEl = document.getElementById("messageInput");
        const chatFormEl = document.getElementById("chatForm");
        const typingIndicatorEl = document.getElementById("typingIndicator");
        const connectionStatusEl = document.getElementById("connectionStatus");
        const connectionLabelEl = document.getElementById("connectionLabel");
        const usernameLabelEl = document.getElementById("usernameLabel");

        const savedName = localStorage.getItem("chat-app-name");
        const userName = savedName || `User-${Math.floor(Math.random() * 1000)}`;
        localStorage.setItem("chat-app-name", userName);
        usernameLabelEl.textContent = `Logged in as ${userName}`;

        let typingTimeoutId = null;
        let isTyping = false;

        function formatTime() {
            return new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addMessage(text, type, sender) {
            const messageEl = document.createElement("div");
            messageEl.className = `message ${type}`;

            if (type === "system") {
                messageEl.textContent = text;
                messagesEl.appendChild(messageEl);
                scrollToBottom();
                return;
            }

            const contentEl = document.createElement("div");
            contentEl.textContent = sender ? `${sender}: ${text}` : text;

            const metaEl = document.createElement("div");
            metaEl.className = "meta";
            metaEl.textContent = formatTime();

            messageEl.appendChild(contentEl);
            messageEl.appendChild(metaEl);
            messagesEl.appendChild(messageEl);
            scrollToBottom();
        }

        function stopTyping() {
            if (!isTyping) {
                return;
            }

            isTyping = false;
            socket.emit("stop-typing");
        }

        chatFormEl.addEventListener("submit", (event) => {
            event.preventDefault();

            const text = messageInputEl.value.trim();
            if (!text) {
                return;
            }

            socket.emit("chat-messsage", {
                text,
                sender: userName,
                socketId: socket.id
            });

            messageInputEl.value = "";
            stopTyping();
        });

        messageInputEl.addEventListener("input", () => {
            const value = messageInputEl.value.trim();

            if (value) {
                if (!isTyping) {
                    isTyping = true;
                    socket.emit("typing", userName);
                }

                clearTimeout(typingTimeoutId);
                typingTimeoutId = setTimeout(() => {
                    stopTyping();
                }, 1200);
            } else {
                clearTimeout(typingTimeoutId);
                stopTyping();
            }
        });

        socket.on("connect", () => {
            connectionStatusEl.classList.add("connected");
            connectionLabelEl.textContent = "Connected";
            addMessage("Connected to chat", "system");
        });

        socket.on("disconnect", () => {
            connectionStatusEl.classList.remove("connected");
            connectionLabelEl.textContent = "Disconnected";
            typingIndicatorEl.textContent = "";
            addMessage("Disconnected from chat", "system");
        });

        socket.on("chat-message", (payload) => {
            const isSelf = payload.socketId === socket.id;
            addMessage(payload.text, isSelf ? "self" : "other", isSelf ? "" : payload.sender);
        });

        socket.on("typing", (name) => {
            typingIndicatorEl.textContent = `${name} is typing...`;
        });

        socket.on("stop-typing", () => {
            typingIndicatorEl.textContent = "";
        });
    </script>
</body>
</html>
